<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Portal</title>
    <style>
        /* Sets your Background folder image as the full-screen background */
        body { 
            font-family: Arial, sans-serif; 
            background: url('Background/bg_image.jpg') no-repeat center center fixed; 
            background-size: cover; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        .portal-card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 35px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.2); 
            width: 320px; 
            text-align: center;
            backdrop-filter: blur(5px);
        }

        h2 { margin-bottom: 20px; color: #1a202c; font-size: 24px; }
        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; margin-bottom: 6px; color: #4a5568; font-size: 14px; font-weight: bold; }
        input { width: 100%; padding: 11px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        /* Interactive Buttons */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 12px; transition: 0.2s; box-sizing: border-box; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-outline { background-color: transparent; border: 2px solid #007bff; color: #007bff; }
        .btn-outline:hover { background-color: #007bff; color: white; }
        
        /* Special Button Styles */
        .btn-chrome { background-color: #ffffff; color: #444; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-chrome:hover { background-color: #f1f1f1; }
        .chrome-icon { width: 18px; height: 18px; }

        .hidden { display: none; }
        .switch-text { margin-top: 25px; font-size: 13px; color: #718096; }
        .switch-text a { color: #007bff; text-decoration: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 1. INITIAL WELCOME SCREEN -->
    <div id="welcome-view" class="portal-card">
        <h2>Secure Gateway</h2>
        <p style="color: #718096; margin-bottom: 30px; font-size: 14px;">Please select an option to access your dashboard.</p>
        <button class="btn btn-primary" onclick="showSignInOptions()">Sign In</button>
        <button class="btn btn-outline" onclick="showSignUp()">Sign Up</button>
    </div>

    <!-- 2. SIGN IN OPTIONS SCREEN -->
    <div id="signin-options-view" class="portal-card hidden">
        <h2>Sign In</h2>
        <p style="color: #718096; margin-bottom: 25px; font-size: 14px;">Choose your authentication method.</p>
        
        <!-- Login with Chrome Button -->
        <button class="btn btn-chrome" onclick="alert('Chrome login initiated!')">
            <img class="chrome-icon" src="https://wikimedia.org" alt="Chrome Logo">
            Login with Chrome
        </button>
        
        <!-- Login with Mail ID Button -->
        <button class="btn btn-primary" onclick="showMailLogin()">
            Login with Mail ID
        </button>

        <div class="switch-text">
            <a href="#" onclick="showWelcome()">← Back to options</a>
        </div>
    </div>

    <!-- 3. ACTUAL MAIL ID LOGIN SCREEN -->
    <div id="mail-login-view" class="portal-card hidden">
        <h2>Login with Mail ID</h2>
        <form onsubmit="event.preventDefault(); alert('Logged in via Mail ID successfully!');">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <div class="switch-text">
            <a href="#" onclick="showSignInOptions()">← Back to Sign In options</a>
        </div>
    </div>

    <!-- 4. CREATE ACCOUNT SCREEN (Appears when clicking Sign Up) -->
    <div id="signup-view" class="portal-card hidden">
        <h2>Create Account</h2>
        <form onsubmit="event.preventDefault(); alert('Account registration submitted successfully!');">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label>Create Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary">Register Account</button>
        </form>
        <div class="switch-text">
            <a href="#" onclick="showWelcome()">← Back to options</a>
        </div>
    </div>

    <script>
        // Setup simple navigation transitions
        function hideAll() {
            document.getElementById('welcome-view').classList.add('hidden');
            document.getElementById('signin-options-view').classList.add('hidden');
            document.getElementById('mail-login-view').classList.add('hidden');
            document.getElementById('signup-view').classList.add('hidden');
        }

        function showWelcome() {
            hideAll();
            document.getElementById('welcome-view').classList.remove('hidden');
        }

        function showSignInOptions() {
            hideAll();
            document.getElementById('signin-options-view').classList.remove('hidden');
        }

        function showMailLogin() {
            hideAll();
            document.getElementById('mail-login-view').classList.remove('hidden');
        }

        function showSignUp() {
            hideAll();
            document.getElementById('signup-view').classList.remove('hidden');
        }
    </script>

</body>
</html>
